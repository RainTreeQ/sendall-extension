<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 440px;
  height: 280px;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  position: relative;
  overflow: hidden;
}
.bg-pattern {
  position: absolute;
  inset: 0;
  opacity: 0.2;
  background-image: 
    radial-gradient(circle at 30% 70%, #4a90d2 0%, transparent 50%),
    radial-gradient(circle at 70% 30%, #5a7c4a 0%, transparent 50%);
}
.content {
  position: relative;
  z-index: 10;
  text-align: center;
}
.logo {
  width: 72px;
  height: 72px;
  background: #fff;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, #333 0%, #666 100%);
  border-radius: 8px;
  position: relative;
}
.logo-icon::before {
  content: '';
  position: absolute;
  left: 11px;
  top: 7px;
  width: 6px;
  height: 22px;
  background: #fff;
  border-radius: 3px;
}
.logo-icon::after {
  content: '';
  position: absolute;
  right: 11px;
  top: 7px;
  width: 6px;
  height: 22px;
  background: #fff;
  border-radius: 3px;
}
h1 {
  font-size: 32px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 8px;
}
h1 span {
  color: #4a90d2;
}
.tagline {
  font-size: 14px;
  color: #888;
}
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="content">
  <div class="logo">
    <div class="logo-icon"></div>
  </div>
  <h1>Sendol</h1>
  <p class="tagline">AI Broadcast</p>
</div>
</body>
</html>
